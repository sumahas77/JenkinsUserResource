<html>
    <head>
        <title>Using Div elements</title>
        <style>
            #parent {
                   border: 3px solid black; 
                   width: 400px;
                   height: 150px;
                   background-color: aquamarine;
            }
        </style>
    </head>
    <body>
        <div id="parent">
            <h2>This is Parent element </h2>
            <div id="child-1" style="color: red;">
                <p>This is first child element</p>
            </div>
            <div id="child-2" style="color: blue;">
                <p>This is second child element</p>
            </div>
        </div>
    </body>
</html>
